{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Blog Insights</title>

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <style>
      :root {
        --primary-color: #4f46e5; /* Modern Indigo */
        --primary-hover: #4338ca;
        --text-main: #111827;
        --text-muted: #6b7280;
        --bg-color: #f3f4f6;
        --input-bg: #f9fafb;
        --input-border: #d1d5db;
        --card-border: #e5e7eb;
      }

      body {
        background-color: var(--bg-color);
        background-image: radial-gradient(
            at 0% 0%,
            rgba(79, 70, 229, 0.1) 0px,
            transparent 50%
          ),
          radial-gradient(
            at 100% 100%,
            rgba(79, 70, 229, 0.1) 0px,
            transparent 50%
          );
        min-height: 100vh;
        margin: 0;
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        color: var(--text-main);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Card Styling */
      .login-card {
        width: 100%;
        max-width: 440px;
        background: #ffffff;
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 40px;
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.05),
          0 10px 15px -3px rgba(0, 0, 0, 0.05);
      }

      /* Typography */
      .title {
        font-size: 28px;
        font-weight: 700;
        line-height: 1.2;
        margin-bottom: 8px;
        color: var(--text-main);
        letter-spacing: -0.5px;
      }

      .subtitle {
        font-size: 15px;
        color: var(--text-muted);
        margin-bottom: 32px;
        line-height: 1.5;
      }

      .field-label {
        font-size: 14px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 8px;
        display: block;
      }

      /* Form Controls */
      .form-control {
        height: 48px;
        padding: 0 16px;
        border-radius: 8px;
        border: 1px solid var(--input-border);
        background-color: var(--input-bg);
        font-size: 15px;
        color: var(--text-main);
        transition: all 0.2s ease;
      }

      .form-control:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        background-color: #fff;
      }

      .input-group-text {
        background-color: var(--input-bg);
        border: 1px solid var(--input-border);
        border-right: none;
        color: var(--text-muted);
        border-radius: 8px 0 0 8px;
      }
      
      .input-group .form-control {
        border-left: none;
        border-radius: 0 8px 8px 0;
      }

      .input-group:focus-within .input-group-text {
        border-color: var(--primary-color);
        background-color: #fff;
      }

      /* Buttons */
      .btn-primary {
        height: 48px;
        border-radius: 8px;
        background: var(--primary-color);
        border: none;
        font-weight: 600;
        font-size: 16px;
        letter-spacing: 0.3px;
        transition: all 0.2s ease;
      }

      .btn-primary:hover {
        background-color: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
      }

      .btn-primary:active {
        transform: translateY(0);
      }

      .btn-secondary-auth {
        height: 48px;
        border-radius: 8px;
        border: 1px solid var(--card-border);
        background: #ffffff;
        color: var(--text-main);
        font-weight: 600;
        font-size: 15px;
        transition: all 0.2s ease;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .btn-secondary-auth:hover {
        background-color: #f9fafb;
        border-color: #d1d5db;
        color: var(--primary-color);
      }

      /* Divider */
      .or-divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 24px 0;
        color: #9ca3af;
        font-size: 13px;
        font-weight: 500;
      }

      .or-divider::before,
      .or-divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #e5e7eb;
      }

      .or-divider:not(:empty)::before {
        margin-right: 16px;
      }

      .or-divider:not(:empty)::after {
        margin-left: 16px;
      }

      /* Footer Links */
      .tiny {
        font-size: 13px;
        color: var(--text-muted);
        text-align: center;
        margin-top: 24px;
        line-height: 1.5;
      }

      .tiny a {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 500;
      }

      .tiny a:hover {
        text-decoration: underline;
      }

      .footer-note {
        text-align: center;
        font-size: 13px;
        color: #9ca3af;
        margin-top: 32px;
      }

      /* Error Alert */
      .alert-danger {
        background-color: #fef2f2;
        border: 1px solid #fecaca;
        color: #991b1b;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 14px;
        margin-bottom: 24px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
          <div class="login-card">
            
            <div class="text-center mb-4">
                <!-- Optional: Add a logo image here if you have one -->
                <!-- <img src="{% static 'images/logo.png' %}" alt="Logo" style="height: 40px; margin-bottom: 20px;"> -->
                <h1 class="title">Welcome back</h1>
                <p class="subtitle">
                  Please enter your details to sign in.
                </p>
            </div>

            {% if error %}
            <div class="alert alert-danger d-flex align-items-center" role="alert">
                <i class="bi bi-exclamation-circle-fill me-2"></i>
                <div>{{ error }}</div>
            </div>
            {% endif %}

            <form method="POST" autocomplete="off">
              {% csrf_token %}

              <div class="mb-3">
                <label class="field-label" for="id_username">Username</label>
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="bi bi-person"></i>
                  </span>
                  
                  <input
                    type="text"
                    id="id_username"
                    name="username"
                    class="form-control"
                    placeholder="Enter your username"
                    required
                  />
                </div>
              </div>

              <div class="mb-4">
                <label class="field-label" for="id_password">Password</label>
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                  </span>
                  <input
                    type="password"
                    id="id_password"
                    name="password"
                    class="form-control"
                    placeholder="••••••••"
                    required
                  />
                </div>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary">Sign In</button>
              </div>
            </form>

            <div class="or-divider">OR</div>

            <div class="d-grid">
              <a href="{% url 'accounts:register' %}" class="btn-secondary-auth">
                Create new account
              </a>
            </div>

            
          </div>

          
        </div>
      </div>
    </div>
  </body>
</html>
