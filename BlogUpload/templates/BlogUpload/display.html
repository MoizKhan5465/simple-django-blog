<!DOCTYPE html>
<html>
<head>
    <title>All Blogs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4 text-center">All Blogs</h2>

    {% for blog in blogs %}

        <div class="card mb-4 shadow-sm">

            <div class="card-body">

                <!-- Blog Title -->
                <h3 class="card-title">
                    {{ blog.title }}
                </h3>

                <!-- Author -->
                <p class="text-muted">
                    Written by <strong>{{ blog.author.username }}</strong>
                </p>

                <!-- Date -->
                <p class="text-secondary">
                    {{ blog.created_at }}
                </p>

                <!-- Blog Content -->
                <p class="card-text">
                    {{ blog.content }}
                </p>

            </div>

        </div>

    {% empty %}

        <div class="alert alert-info text-center">
            No blogs available.
        </div>

    {% endfor %}

</div>

</body>
</html>
